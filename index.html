<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro-Nova</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(to bottom,#6EC6FF,#2196F3,#1565C0,#0D47A1,#001B44);
color:white;
line-height:1.7;
}

.hero{
position:relative;
}

.banner{
width:100%;
height:420px;
object-fit:cover;
display:block;
}

.hero header{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:rgba(0,0,0,.45);
padding:20px;
}

header h1{
font-size:60px;
color:#00E5FF;
text-shadow:0 0 10px #00E5FF,
             0 0 20px #00E5FF,
             0 0 40px #00E5FF;
}

header h2{
margin-top:15px;
font-size:28px;
font-weight:normal;
color:white;
}

header p{
margin-top:25px;
font-size:20px;
max-width:800px;
margin-left:auto;
margin-right:auto;
}

section{
max-width:1100px;
margin:auto;
padding:60px 30px;
}

h3{
color:#00E5FF;
font-size:35px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,.1);
padding:25px;
border-radius:15px;
backdrop-filter:blur(5px);
transition:.4s;
border:1px solid rgba(255,255,255,.2);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px cyan;
}

footer{
text-align:center;
padding:40px;
background:rgba(0,0,0,.4);
margin-top:60px;
}
